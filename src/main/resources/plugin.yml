main: de.dxvampi.DeEssentials
version: 0.3alpha
name: DeEssentials
author: dxvampi
api-version: 1.13
commands:
  ping:
    description: Pong!
  deessentials:
    description: Main command for De-Essentials
    aliases:
      - dessentials
      - essentials
    permission: deessentials.maincommand
    permission-message: ""
  uptime:
    description: Uptime of the server
    aliases:
      - upt
      - serveruptime
      - supt
    permission: deessentials.uptime
    permission-message: ""
  heal:
    description: Heals yourself or another player
    aliases:
      - cure
    permission: deessentials.heal
    permission-message: ""
  feed:
    description: Feeds yourself or another player
    permission: deessentials.feed
    permission-message: ""
  tpall:
    description: Teleport everyone to one
    permission: deessentials.tpall
    permission-message: ""
  tphere:
    description: Teleports a player to yourself
    aliases:
      - tph
    permission: deessentials.tphere
    permission-message: ""
  fly:
    description: Allows the user to fly
    aliases:
      - flight
    permission: deessentials.fly
    permission-message: ""
  spawn:
    description: Teleports you to the spawn
    permission: deessentials.spawn
    permission-message: ""
  setspawn:
    description: Sets the spawn position
    permission: deessentials.setspawn
    permission-message: ""
  invsee:
    description: Displays a player's inventory
    aliases:
      - inventorysee
    permission: deessentials.invsee
    permission-message: ""
  craft:
    description: Displays a crafting table interface
    aliases:
      - workbench
      - wb
    permission: deessentials.craft
    permission-message: ""
  enderchest:
    description: Displays a player's ender chest
    aliases:
      - ec
    permission: deessentials.enderchest
    permission-message: ""
  # GAMEMODE COMMANDS
  gms:
    description: Switches to survival mode
    aliases:
      - gm0
    permission: deessentials.gamemode.survival
    permission-message: ""
  gmc:
    description: Switches to creative mode
    aliases:
      - gm1
    permission: deessentials.gamemode.creative
    permission-message: ""
  gma:
    description: Switches to adventure mode
    aliases:
      - gm2
    permission: deessentials.gamemode.adventure
    permission-message: ""
  gmsp:
    description: Switches to spectator mode
    aliases:
      - gm3
    permission: deessentials.gamemode.spectator
    permission-message: ""

  trash:
    description: Opens a temporary inventory
    aliases:
      - trashbin
      - trashcan
    permission: deessentials.trash
    permission-message: ""

  hat:
    description: Put any item as a hat
    permission: deessentials.hat
    permission-message: ""

  god:
    description: Makes the player invincible
    permission: deessentials.god
    permission-message: ""

permissions:
  # Main Command
  deessentials.maincommand:
    description: Allow players to use /deessentials or any of the alias
    default: true

  # Main command subcommands
  deessentials.maincommand.get:
    description: Allow players to see info about the plugin
    default: op
  deessentials.maincommand.date:
    description: Allow players to see the actual date
    default: true
  deessentials.maincommand.version:
    description: Allow players to see the current plugin's version
    default: op
  deessentials.maincommand.help:
    description: Allow players to see help about the plugin commands
    default: true
  deessentials.maincommand.reload:
    description: Allows the user to reload the config
    default: op

  # Uptime command
  deessentials.uptime:
    description: Allow players to see the server uptime
    default: op

  # Heal command
  deessentials.heal:
    description: Makes you able to heal yourself
    default: op
  deessentials.heal.others:
    description: Makes you able to heal others
    default: op

  # Feed command
  deessentials.feed:
    description: Makes you able to feed yourself
    default: op
  deessentials.feed.others:
    description: Makes you able to feed others
    default: op

  # TPAll command
  deessentials.tpall:
    description: Makes the user able to teleport everybody to a player
    default: op

  # TPHere command
  deessentials.tphere:
    description: Makes the user able to teleport other to himself
    default: op

  # Fly command
  deessentials.fly:
    description: Makes the user able to switch to fly mode
    default: op
  deessentials.fly.others:
    description: Makes the user able to switch other people's fly mode
    default: op

  # Setspawn command
  deessentials.setspawn:
    description: Allows the user to set the spawn
    default: op

  # Spawn command
  deessentials.spawn:
    description: Allows the user to teleport to the spawn
    default: true
  deessentials.spawn.others:
    description: Allows the user to send other people to the spawn
    default: op

  # InvSee command
  deessentials.invsee:
    description: Allows the user to see other player's inventory
    default: op

  # Craft command
  deessentials.craft:
    description: Allows the user to craft wherever
    default: op

  # Gamemode switching
  deessentials.gamemode.*:
    description: Allows the user to switch to whatever mode
    default: op
    children:
      deessentials.gamemode.survival: true
      deessentials.gamemode.creative: true
      deessentials.gamemode.adventure: true
      deessentials.gamemode.spectator: true

  # Trash command
  deessentials.trash:
    description: Allows the user to open a temporary inventory
    default: op

  # Hat command
  deessentials.hat:
    description: Allows the user to use any item as a hat
    default: op

  # God command
  deessentials.god:
    description: Allows the user to make invincible
    default: op
    children:
      deessentials.god.others: true